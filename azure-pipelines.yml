trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'app-hotel-coonection'
  appName: 'milanhotelapp12345'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  jobs:

  - job: BuildJob
    steps:

    - task: UseNode@1
      inputs:
        version: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
      displayName: 'Install Dependencies'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/hotelapp.zip'
        replaceExistingArchive: true
      displayName: 'Archive Application'

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'
      displayName: 'Publish Artifact'

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  dependsOn: Build

  jobs:

  - job: DeployWebApp
    steps:

    - download: current
      artifact: drop

    - task: AzureWebApp@1
      inputs:
        azureSubscription: 'app-hotel-coonection'
        appType: 'webAppLinux'
        appName: 'milanhotelapp12345'
        package: '$(Pipeline.Workspace)/drop/hotelapp.zip'
      displayName: 'Deploy to Azure App Service'
