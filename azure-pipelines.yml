trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: milanacr2026
  acrLoginServer: milanacr2026.azurecr.io
  imageName: hotel-app
  imageTag: $(Build.BuildId)
  fullImageName: milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

stages:

# =========================
# BUILD + PUSH IMAGE
# =========================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildPush
    steps:

    # Install Docker (safe on hosted agent)
    - task: DockerInstaller@0
      displayName: Install Docker

    # Login to Azure using Service Connection (IMPORTANT FIX)
    - task: AzureCLI@2
      displayName: Login to Azure + ACR
      inputs:
        azureSubscription: 'app-hotel-coonection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)

    # Build image
    - script: |
        docker build -t $(fullImageName) .
      displayName: Build Docker Image

    # Push image
    - script: |
        docker push $(fullImageName)
      displayName: Push Docker Image

# =========================
# DEPLOY TO VM
# =========================
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployVM
    pool:
      vmImage: ubuntu-latest

    steps:

    - task: SSH@0
      displayName: Deploy on VM
      inputs:
        sshEndpoint: 'vm-ssh-connection'
        runOptions: inline
        inline: |
          echo "Stopping old container..."
          docker stop hotel-app || true
          docker rm hotel-app || true

          echo "Pulling new image..."
          docker pull milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

          echo "Running new container..."
          docker run -d \
            --name hotel-app \
            -p 80:3000 \
            milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

          echo "Deployment successful"