trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: hotel-app
  acrName: milanacr2026
  imageTag: $(Build.BuildId)
  fullImageName: milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

stages:

# =========================
# BUILD & DOCKER IMAGE
# =========================
- stage: Build
  displayName: Build Docker Image
  jobs:

  - job: BuildJob
    steps:

    - task: UseNode@1
      inputs:
        version: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
      displayName: 'Install Dependencies'

    # =========================
    # LOGIN TO ACR
    # =========================
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'app-hotel-coonection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
      displayName: 'Login to ACR'

    # =========================
    # BUILD DOCKER IMAGE
    # =========================
    - script: |
        docker build -t $(fullImageName) .
      displayName: 'Build Docker Image'

    # =========================
    # PUSH TO ACR
    # =========================
    - script: |
        docker push $(fullImageName)
      displayName: 'Push Image to ACR'

# =========================
# DEPLOY STAGE (READY FOR VM)
# =========================
- stage: DeployInfo
  displayName: Show Deployment Info
  dependsOn: Build
  jobs:

  - job: Output
    steps:

    - script: |
        echo "IMAGE PUSHED SUCCESSFULLY"
        echo "Use this image on VM:"
        echo "milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)"
      displayName: 'Deployment Info'