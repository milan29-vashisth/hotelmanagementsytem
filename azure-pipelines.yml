trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: hotel-app
  acrName: milanacr2026.azurecr.io
  imageTag: $(Build.BuildId)
  fullImageName: $(acrName)/$(imageRepository):$(imageTag)

stages:

# =========================
# BUILD & PUSH IMAGE
# =========================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:

  - job: BuildPush
    steps:

    - task: Docker@2
      displayName: Build image
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: '**/Dockerfile'
        containerRegistry: 'milan-acr-connection'
        tags: |
          $(imageTag)

    - task: Docker@2
      displayName: Push image
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: 'milan-acr-connection'
        tags: |
          $(imageTag)

# =========================
# DEPLOY TO VM
# =========================
- stage: Deploy
  dependsOn: Build
  jobs:

  - job: DeployVM
    pool:
      vmImage: ubuntu-latest

    steps:

    - task: SSH@0
      inputs:
        sshEndpoint: 'vm-ssh-connection'
        runOptions: inline
        inline: |
          echo "Pulling latest image..."

          docker stop hotel-app || true
          docker rm hotel-app || true

          docker pull milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

          docker run -d \
            --name hotel-app \
            -p 80:3000 \
            milanacr2026.azurecr.io/hotel-app:$(Build.BuildId)

          echo "Deployment successful"